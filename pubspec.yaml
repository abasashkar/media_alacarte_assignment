name: ad_campaign_dashboard
description: "Ad Campaign Performance Dashboard - Media Alacarte coding challenge."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7

  # Networking
  dio: ^5.7.0

  # Routing
  go_router: ^14.6.2

  # Dependency injection
  get_it: ^8.0.3

  # Functional error handling
  dartz: ^0.10.1

  # Charts
  fl_chart: ^0.69.2

  # Local notifications
  flutter_local_notifications: ^17.2.4

  # Formatting
  intl: ^0.19.0

  # Local persistence (offline cache + theme mode)
  shared_preferences: ^2.3.3

  # Fonts
  google_fonts: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
